<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoMD | TERMINAL v2.8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --crt-green: #33ff33; --crt-blue: #33ccff; --bg-color: #0a0a0a; --crt-red: #ff3333; --crt-purple: #bb66ff; --crt-amber: #ffb000; }
        body { background-color: var(--bg-color); color: var(--crt-green); font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4; }
        .container { max-width: 1100px; margin-top: 2rem; border: 1px solid var(--crt-green); padding: 25px; box-shadow: 0 0 20px rgba(51, 255, 51, 0.15); margin-bottom: 80px; }
        h2 { border-bottom: 1px solid var(--crt-green); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--crt-green); }
        .card { background: #111; border: 1px solid #333; margin-bottom: 20px; color: #ccc; border-radius: 0; }
        .card-header { background: #1a1a1a; border-bottom: 1px solid #333; color: var(--crt-blue); font-weight: bold; display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; }
        .btn-crt { background: transparent; border: 1px solid var(--crt-green); color: var(--crt-green); border-radius: 0; transition: 0.2s; text-transform: uppercase; font-size: 11px; padding: 5px 12px; }
        .btn-crt:hover { background: var(--crt-green); color: #000; }
        .btn-blue { border-color: var(--crt-blue); color: var(--crt-blue); }
        .btn-blue:hover { background: var(--crt-blue); color: #000; }
        .btn-del { border-color: var(--crt-red); color: var(--crt-red); }
        .btn-del:hover { background: var(--crt-red); color: #fff; }
        .form-control { background: #000; border: 1px solid #444; color: var(--crt-green); border-radius: 0; margin-bottom: 5px; font-size: 13px; }
        .form-control:focus { background: #050505; color: var(--crt-green); border-color: var(--crt-blue); box-shadow: none; }
        .nav-tabs { border-bottom: 1px solid var(--crt-green); }
        .nav-tabs .nav-link { color: var(--crt-green); border: none; border-radius: 0; padding: 10px 20px; }
        .nav-tabs .nav-link.active { background: var(--crt-green); color: #000; font-weight: bold; }
        .pub-item, .help-item { border-left: 2px solid var(--crt-blue); padding: 12px 15px; margin-bottom: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .label-text { font-size: 11px; color: var(--crt-blue); text-transform: uppercase; display: block; margin-top: 8px; margin-bottom: 3px; font-weight: bold; }
        .crt-amber { color: var(--crt-amber); font-weight: bold; }
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid var(--crt-green); padding: 5px 20px; font-size: 11px; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <h2>> DOMD_SYSTEM_DATA_TERMINAL_V2.8</h2>
    <div class="d-flex gap-2 my-4">
        <button class="btn btn-crt" onclick="fetchData()">[ 1. LOAD_DATA ]</button>
        <button class="btn btn-crt btn-blue" onclick="exportJSON()">[ 2. SYNC_&_EXPORT ]</button>
    </div>

    <ul class="nav nav-tabs mb-4" id="mainTabs">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-about">ABOUT_PROJECT</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-news">NEWS</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-team">TEAM_CV</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-pub">PUBLICATIONS</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-help">HELP_DOCS</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-about"><div id="about-container"></div></div>
        <div class="tab-pane fade" id="tab-news"><div id="news-list"></div><button class="btn btn-crt mt-3" onclick="addNews()">+ ADD_NEWS</button></div>
        <div class="tab-pane fade" id="tab-team"><div id="team-list"></div><button class="btn btn-crt mt-3" onclick="addMember()">+ ADD_MEMBER</button></div>
        <div class="tab-pane fade" id="tab-pub"><div id="pub-list"></div><button class="btn btn-crt mt-3" onclick="addPubGroup()">+ ADD_GROUP</button></div>
        <div class="tab-pane fade" id="tab-help"><div id="help-container"></div></div>
    </div>
</div>

<div class="status-bar">STATUS: <span id="sys-status">IDLE</span> | LIST_FORMATTER: ENABLED (AUTO MINIFY/PRETTY)</div>

<script>
    let db = null;

    // --- 核心列表处理引擎 ---

    function minifyHTMLLists(html) {
        if (!html) return html;
        return html.replace(/<(ul|ol)[\s\S]*?<\/\1>/g, (match) => {
            return match.replace(/\n\s*/g, '');
        });
    }

    function prettyPrintHTMLLists(html) {
        if (!html) return html;
        return html.replace(/<(ul|ol)[^>]*>([\s\S]*?)<\/\1>/g, (match, tag, content) => {
            let inner = content.replace(/<\/li>\s*/g, '</li>\n  ').trim();
            return `<${tag}>\n  ${inner}\n</${tag}>`;
        });
    }

    // --- 数据逻辑 ---

    function findNode(label) { return db.root.find(n => n.label === label); }

    function parsePubContent(content) {
        if (!content) return [];
        const rawEntries = content.trim().split(/\n(?=\d+\.)/);
        return rawEntries.map(entry => {
            const lines = entry.trim().split('\n');
            const meta = lines[0] || "";
            const desc = prettyPrintHTMLLists(lines.slice(1).join('\n')) || "";
            const obj = { authors: '', journal: '', year: '', details: '', desc: desc };
            // 兼容旧的 <span> 标签和新的 <i>/<strong> 标签
            const m = meta.match(/(?:\d+\.\s)?(.*),\s(?:<span style='font-style: italic;'>|<i>)(.*)(?:<\/span>|<\/i>),\s(?:<span style='font-weight: bold;'>|<strong>)(.*)(?:<\/span>|<\/strong>),\s(.*)\./);
            if(m) { obj.authors = m[1]; obj.journal = m[2]; obj.year = m[3]; obj.details = m[4]; }
            else { obj.authors = meta.replace(/^\d+\.\s/, ""); }
            return obj;
        });
    }

    function compilePubContent(pubs) {
        return pubs.map((p, i) => {
            // 改为使用标准的 <i> 和 <strong> 标签
            let metaLine = `${i + 1}. ${p.authors}, <i>${p.journal}</i>, <strong>${p.year}</strong>, ${p.details}.`;
            let desc = minifyHTMLLists(p.desc);
            return desc ? `${metaLine}\n${desc}` : metaLine;
        }).join('\n');
    }

    function parseCV(content) {
        const d = { name:'', role:'', photo:'', bio:'', research:'', email:'', pubs:[] };
        const nameM = content.match(/NAME:<\/span> (.*)\n/);
        const roleM = content.match(/ROLE:<\/span> (.*)\n/);
        const photoM = content.match(/\[\[IMG: (.*?) \|/);
        // FIX: 添加了 ? 容错匹配可能遗漏的空格，确保准确提取用户的 \n
        const bioM = content.match(/BIO:<\/span> ?([\s\S]*?)\n(?:<[^>]+>)?RESEARCH AREA:/);
        const resM = content.match(/RESEARCH AREA:<\/span> ?([\s\S]*?)\n(?:<[^>]+>)?Email:/);
        const emailM = content.match(/Email:<\/span> (.*)\n/);
        
        if(nameM) d.name = nameM[1]; if(roleM) d.role = roleM[1]; if(photoM) d.photo = photoM[1];
        if(bioM) d.bio = prettyPrintHTMLLists(bioM[1]); if(resM) d.research = prettyPrintHTMLLists(resM[1]); if(emailM) d.email = emailM[1];
        const parts = content.split("Publications:</span>");
        if(parts[1]) d.pubs = parsePubContent(parts[1]);
        return d;
    }

    async function fetchData() {
        try {
            const res = await fetch('/contents/data.json');
            db = await res.json();
            renderAll();
            document.getElementById('sys-status').innerText = "READY";
        } catch(e) { alert("Fetch failed."); }
    }

    function renderAll() { if(!db) return; renderAbout(); renderNews(); renderTeam(); renderPubs(); renderHelp(); }

    function renderAbout() {
        const aboutNode = findNode("ABOUT PROJECT");
        document.getElementById('about-container').innerHTML = `
            ${aboutNode.items.map((item, i) => `
                <div class="card mb-3">
                    <div class="card-header">
                        ITEM: ${item.label}
                        <button class="btn btn-del" onclick="syncAll(); removeAbout(${i})">REMOVE</button>
                    </div>
                    <div class="card-body">
                        <div class="d-flex gap-2 mb-2">
                            <div class="flex-grow-1">
                                <label class="label-text">LABEL</label>
                                <input type="text" class="form-control fw-bold" value="${item.label}" id="about-${i}-label">
                            </div>
                            <div style="width: 150px;">
                                <label class="label-text">MODE</label>
                                <input type="text" class="form-control" value="${item.mode || ''}" id="about-${i}-mode">
                            </div>
                        </div>
                        <label class="label-text">CONTENT (AUTO-FORMATTED)</label>
                        <textarea class="form-control" rows="10" id="about-${i}-content">\n${prettyPrintHTMLLists(item.content)}</textarea>
                    </div>
                </div>
            `).join('')}
            <button class="btn btn-crt btn-blue mt-2" onclick="syncAll(); addAbout()">+ ADD_ABOUT_ITEM</button>
        `;
    }

    function renderNews() {
        document.getElementById('news-list').innerHTML = db.sys.news.map((n, i) => `
            <div class="input-group mb-2"><input type="text" class="form-control" value="${n}" id="news-${i}">
            <button class="btn btn-del" onclick="syncAll(); db.sys.news.splice(${i},1);renderNews()">DEL</button></div>`).join('');
    }

    function renderTeam() {
        const members = findNode("TEAM & CVs").items;
        document.getElementById('team-list').innerHTML = members.map((m, i) => {
            const d = parseCV(m.content);
            return `<div class="card"><div class="card-header">MEMBER: ${m.label} 
                <div>
                    ${i > 0 ? `<button class="btn btn-crt me-1" onclick="moveMember(${i}, -1)">UP</button>` : ''}
                    ${i < members.length - 1 ? `<button class="btn btn-crt me-1" onclick="moveMember(${i}, 1)">DOWN</button>` : ''}
                    <button class="btn btn-del" onclick="removeMember(${i})">REMOVE</button>
                </div>
                </div>
                <div class="card-body"><div class="row"><div class="col-md-6">
                <label class="label-text">LABEL</label><input type="text" class="form-control" value="${m.label}" id="team-${i}-label">
                <label class="label-text">NAME</label><input type="text" class="form-control" value="${d.name}" id="team-${i}-name"></div>
                <div class="col-md-6"><label class="label-text">PHOTO</label><input type="text" class="form-control" value="${d.photo}" id="team-${i}-photo">
                <label class="label-text">EMAIL</label><input type="text" class="form-control" value="${d.email}" id="team-${i}-email"></div></div>
                <label class="label-text">ROLE</label><input type="text" class="form-control" value="${d.role}" id="team-${i}-role">
                <label class="label-text">BIO_HTML</label>
                <textarea class="form-control" id="team-${i}-bio">\n${d.bio}</textarea>
                <label class="label-text" style="color:var(--crt-purple)">RESEARCH AREA</label>
                <textarea class="form-control" id="team-${i}-res">\n${d.research || ""}</textarea>
                <div class="mt-3"><div id="team-${i}-pubs">${renderPubItemsUI(d.pubs, `team-${i}`)}</div><button class="btn btn-crt btn-blue mt-2" onclick="syncAll(); addPub('team', ${i})">+ ADD_PUB</button></div></div></div>`;
        }).join('');
    }

    function renderPubs() {
        const groups = findNode("PUBLICATIONS").items;
        document.getElementById('pub-list').innerHTML = groups.map((g, i) => `
            <div class="card"><div class="card-header">GROUP: ${g.label} <button class="btn btn-del" onclick="removePubGroup(${i})">REMOVE</button></div>
                <div class="card-body"><input type="text" class="form-control fw-bold" value="${g.label}" id="pubg-${i}-label">
                <div id="pubg-${i}-pubs" class="mt-2">${renderPubItemsUI(parsePubContent(g.content), `pubg-${i}`)}</div>
                <button class="btn btn-crt btn-blue mt-2" onclick="syncAll(); addPub('global', ${i})">+ ADD_PUB</button></div></div>`).join('');
    }

    function renderPubItemsUI(pubs, pre) {
        return pubs.map((p, pi) => `
            <div class="pub-item"><div class="d-flex gap-2"><input type="text" class="form-control" value="${p.authors}" id="${pre}-p-${pi}-a">
            <button class="btn btn-del" onclick="syncAll(); removePub('${pre}', ${pi})">DEL</button></div>
            <div class="d-flex gap-2"><input type="text" class="form-control" value="${p.journal}" id="${pre}-p-${pi}-j">
            <input type="text" class="form-control" style="width:90px" value="${p.year}" id="${pre}-p-${pi}-y">
            <input type="text" class="form-control" value="${p.details}" id="${pre}-p-${pi}-d"></div>
            <textarea class="form-control desc-area" rows="1" id="${pre}-p-${pi}-desc">\n${p.desc}</textarea></div>`).join('');
    }

    function renderHelp() {
        const help = findNode("HELP"); 
        const inst = help.items.find(x => x.label === "INSTALLATION"); 
        const tuts = help.items.find(x => x.label === "TOTURIALs");
        
        let instHtml = inst.items.map((item, i) => `
            <div class="help-item">
                <div class="d-flex gap-2 mb-2">
                    <input type="text" class="form-control fw-bold" value="${item.label}" id="inst-${i}-label">
                    <button class="btn btn-del" onclick="syncAll(); removeInst(${i})">REMOVE</button>
                </div>
                <textarea class="form-control" rows="6" id="inst-${i}-content">\n${prettyPrintHTMLLists(item.content)}</textarea>
            </div>
        `).join('');

        let tutHtml = tuts.items.map((t, i) => `
            <div class="help-item">
                <div class="d-flex gap-2 mb-2">
                    <input type="text" class="form-control fw-bold" value="${t.label}" id="tut-${i}-label">
                    <button class="btn btn-del" onclick="syncAll(); removeTut(${i})">REMOVE</button>
                </div>
                <textarea class="form-control" rows="4" id="tut-${i}-content">\n${prettyPrintHTMLLists(t.content)}</textarea>
            </div>
        `).join('');

        document.getElementById('help-container').innerHTML = `
            <div class="card">
                <div class="card-header">INSTALLATION</div>
                <div class="card-body">
                    <div id="help-inst-list">${instHtml}</div>
                    <button class="btn btn-crt btn-blue mt-2" onclick="syncAll(); addInst()">+ ADD_INSTALL_ITEM</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header">TUTORIALS</div>
                <div class="card-body">
                    <div id="help-tut-list">${tutHtml}</div>
                    <button class="btn btn-crt btn-blue mt-2" onclick="syncAll(); addTut()">+ ADD_EXAMPLE</button>
                </div>
            </div>`;
    }

    function syncAll() {
        if(!db) return;
        
        db.sys.news = db.sys.news.map((_, i) => {
            let val = document.getElementById(`news-${i}`).value;
            let cleanVal = val.replace(/<span class='crt-amber'>\[(\d{4}-\d{2}-\d{2})\]<\/span>/g, "[$1]");
            return cleanVal.replace(/\[(\d{4}-\d{2}-\d{2})\]/g, "<span class='crt-amber'>[$1]</span>");
        });

        const aboutNode = findNode("ABOUT PROJECT");
        aboutNode.items.forEach((item, i) => {
            item.label = document.getElementById(`about-${i}-label`).value;
            item.mode = document.getElementById(`about-${i}-mode`).value;
            item.content = minifyHTMLLists(document.getElementById(`about-${i}-content`).value);
        });

        findNode("TEAM & CVs").items.forEach((m, i) => {
            m.label = document.getElementById(`team-${i}-label`).value;
            const ps = []; document.getElementById(`team-${i}-pubs`).querySelectorAll('.pub-item').forEach((_, pi) => { ps.push({ authors: document.getElementById(`team-${i}-p-${pi}-a`).value, journal: document.getElementById(`team-${i}-p-${pi}-j`).value, year: document.getElementById(`team-${i}-p-${pi}-y`).value, details: document.getElementById(`team-${i}-p-${pi}-d`).value, desc: document.getElementById(`team-${i}-p-${pi}-desc`).value }); });
            m.content = `<span class='crt-blue'>NAME:</span> ${document.getElementById(`team-${i}-name`).value}\n<span class='crt-blue'>ROLE:</span> ${document.getElementById(`team-${i}-role`).value}\n[[IMG: ${document.getElementById(`team-${i}-photo`).value} | PHOTO | small ]]\n<span class='crt-blue'>BIO:</span> ${minifyHTMLLists(document.getElementById(`team-${i}-bio`).value)}\n<span class='crt-blue'>RESEARCH AREA:</span> ${minifyHTMLLists(document.getElementById(`team-${i}-res`).value)}\n<span class='crt-blue'>Email:</span> ${document.getElementById(`team-${i}-email`).value}\n<span class='crt-blue'>Publications:</span>\n` + compilePubContent(ps);
        });

        findNode("PUBLICATIONS").items.forEach((g, i) => {
            g.label = document.getElementById(`pubg-${i}-label`).value;
            const ps = []; document.getElementById(`pubg-${i}-pubs`).querySelectorAll('.pub-item').forEach((_, pi) => { ps.push({ authors: document.getElementById(`pubg-${i}-p-${pi}-a`).value, journal: document.getElementById(`pubg-${i}-p-${pi}-j`).value, year: document.getElementById(`pubg-${i}-p-${pi}-y`).value, details: document.getElementById(`pubg-${i}-p-${pi}-d`).value, desc: document.getElementById(`pubg-${i}-p-${pi}-desc`).value }); });
            g.content = compilePubContent(ps);
        });

        const help = findNode("HELP"); 
        help.items.find(x => x.label === "INSTALLATION").items.forEach((item, i) => {
            item.label = document.getElementById(`inst-${i}-label`).value;
            item.content = minifyHTMLLists(document.getElementById(`inst-${i}-content`).value);
        });
        help.items.find(x => x.label === "TOTURIALs").items.forEach((t, i) => { 
            t.label = document.getElementById(`tut-${i}-label`).value; 
            t.content = minifyHTMLLists(document.getElementById(`tut-${i}-content`).value); 
        });
    }

    // -- 添加/删除/移动 组件方法 --

    function addAbout() { findNode("ABOUT PROJECT").items.push({label:"New Item", type:"file", mode:"fast", content:""}); renderAbout(); }
    function removeAbout(i) { findNode("ABOUT PROJECT").items.splice(i, 1); renderAbout(); }

    function addInst() { findNode("HELP").items.find(x => x.label === "INSTALLATION").items.push({label:"New Step", type:"file", content:""}); renderHelp(); }
    function removeInst(i) { findNode("HELP").items.find(x => x.label === "INSTALLATION").items.splice(i, 1); renderHelp(); }

    function addTut() { findNode("HELP").items.find(x => x.label === "TOTURIALs").items.push({label:"New Tutorial", type:"file", content:""}); renderHelp(); }
    function removeTut(i) { findNode("HELP").items.find(x => x.label === "TOTURIALs").items.splice(i, 1); renderHelp(); }

    function addNews() { db.sys.news.unshift(`<span class='crt-amber'>[${new Date().toISOString().split('T')[0]}]</span> NEW_EVENT`); renderNews(); }
    
    function addPub(type, idx) {
        let node = type === 'team' ? findNode("TEAM & CVs").items[idx] : findNode("PUBLICATIONS").items[idx];
        let ps = parsePubContent(type === 'team' ? node.content.split("Publications:</span>")[1] : node.content);
        ps.push({ authors:'', journal:'', year:'', details:'', desc:'' });
        node.content = type === 'team' ? node.content.split("Publications:</span>")[0] + "Publications:</span>\n" + compilePubContent(ps) : compilePubContent(ps);
        type === 'team' ? renderTeam() : renderPubs();
    }
    
    function removePub(pre, pi) {
        let idx = parseInt(pre.split('-')[1]); let node = pre.startsWith('team') ? findNode("TEAM & CVs").items[idx] : findNode("PUBLICATIONS").items[idx];
        let ps = parsePubContent(pre.startsWith('team') ? node.content.split("Publications:</span>")[1] : node.content);
        ps.splice(pi, 1);
        node.content = pre.startsWith('team') ? node.content.split("Publications:</span>")[0] + "Publications:</span>\n" + compilePubContent(ps) : compilePubContent(ps);
        pre.startsWith('team') ? renderTeam() : renderPubs();
    }
    
    function addMember() { findNode("TEAM & CVs").items.push({label:"New Member", type:"file", content:"<span class='crt-blue'>NAME:</span> \n<span class='crt-blue'>ROLE:</span> \n[[IMG: # | PHOTO | small ]]\n<span class='crt-blue'>BIO:</span> \n<span class='crt-blue'>RESEARCH AREA:</span> \n<span class='crt-blue'>Email:</span> \n<span class='crt-blue'>Publications:</span>\n"}); renderTeam(); }
    function removeMember(i) { findNode("TEAM & CVs").items.splice(i, 1); renderTeam(); }
    
    // 移动团队成员位置
    function moveMember(i, dir) {
        syncAll(); // 先同步当前页面输入的数据
        const items = findNode("TEAM & CVs").items;
        if (i + dir >= 0 && i + dir < items.length) {
            const temp = items[i];
            items[i] = items[i + dir];
            items[i + dir] = temp;
            renderTeam(); // 重绘UI
        }
    }
    
    function addPubGroup() { findNode("PUBLICATIONS").items.push({label:"2026", type:"file", content:""}); renderPubs(); }
    function removePubGroup(i) { findNode("PUBLICATIONS").items.splice(i, 1); renderPubs(); }
    
    function exportJSON() { syncAll(); const b = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "data.json"; a.click(); }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
