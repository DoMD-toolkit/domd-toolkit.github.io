<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoMD-Toolkit</title>
    <link rel="stylesheet" href="/css/style.css">
	<script>
		window.MathJax = {
			tex: {
				inlineMath: [['$', '$'], ['\\(', '\\)']],
				displayMath: [['$$', '$$'], ['\\[', '\\]']],
				processEscapes: true // allow \$
			},
			options: {
				skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'span.token-string'],
				ignoreHtmlClass: 'code-panel|code-header|code-body'
			},
			svg: {
				scale: 1.1,
				displayAlign: 'left',
				displayIndent: '2em',
				fontCache: 'global'
			},
			startup: {
				typeset: false 
			}
		};
	</script>
	<script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/4.0.0/tex-svg.min.js"></script>
</head>
<body>
	<div class="crt-container">
		<div class="scanlines"></div>
		<div class="screen-overlay"></div>

		<div class="screen">
			<div id="static-header">
				<div class="hardware-logo">DoMD-Toolkit v1.0</div>
			</div>
			<div id="terminal-output"></div>
			<div id="interactive-area"></div>
			<span class="cursor" id="global-cursor">_</span>
		</div>
	</div>
    <script src="/js/script.js"></script>
</body>
</html>
